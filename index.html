<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fainder - Welcome</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gate-container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }
        .logo-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #333, #111);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #444;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        h1 { font-weight: 300; letter-spacing: 5px; margin-bottom: 30px; }
        .launch-btn {
            background: none;
            border: 1px solid #666;
            color: #ccc;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .launch-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="gate-container">
        <div class="logo-circle">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=80" style="width:60px; border-radius:10px;">
        </div>
        <h1>FAINDER</h1>
        <button class="launch-btn" onclick="location.href='index2.html'">Fainderを起動する</button>
    </div>

    <script>
    // 右クリック禁止
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // キーボードショートカット禁止 (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
    document.onkeydown = function(e) {
        if (e.keyCode == 123) { // F12
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) {
            return false;
        }
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // ソース表示
            return false;
        }
    };
</script>
    <script>
    setInterval(function() {
        debugger;
    }, 100);
</script>

    setInterval(function() {
        console.clear();
        console.log("%c警告: ここでコードをいじらないでください", "color: red; font-size: 30px; font-weight: bold;");
    }, 1000);
</script>
    
</body>
</html>
