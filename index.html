<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikan Dev Lab</title>
    <style>
        body { background: #131314; color: #e3e3e3; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #gate-container { text-align: center; }
        .gate-input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1e1f20; color: white; margin-bottom: 10px; width: 220px; outline: none; }
        .gate-btn { padding: 12px 24px; border-radius: 8px; border: none; background: #4285f4; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body id="appBody">

    <div id="gate-container">
        <h1>Mikan Project Portal</h1>
        <p>Experimental UI Testing Site</p>
        <input type="password" id="gate-pass" class="gate-input" placeholder="Access Code">
        <br>
        <button onclick="verifyGate()" class="gate-btn">Agree & Enter</button>
    </div>

    <div id="sns-root" style="display:none; width: 100%;"></div>

    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    
    <script src="gateway.js"></script>
    <script src="app.js"></script>

    <script>
        // ボット対策の即時実行
        (function() {
            const ua = navigator.userAgent.toLowerCase();
            const bots = ["googlebot", "bingbot", "lighthouse", "spider"];
            if (bots.some(b => ua.includes(b))) {
                document.body.innerHTML = "<h1>Mikan Portfolio</h1><p>Under maintenance.</p>";
            }
        })();
    </script>
</body>
</html>
