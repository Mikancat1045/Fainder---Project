<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikan Lab Portfolio</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        #dummy-page { padding: 40px; text-align: center; }
        .gate-banner { position: fixed; bottom: 0; width: 100%; background: #202124; color: #fff; padding: 20px; text-align: center; }
        button { cursor: pointer; padding: 8px 16px; }
    </style>
</head>
<body id="main-body">

    <div id="dummy-page">
        <h1>Research Portfolio</h1>
        <p>JavaScriptとUIデザインの検証サイトです。</p>
    </div>

    <div id="gate-banner" class="gate-banner">
        <div id="step-1">
            <p>コンテンツを表示するには同意してください。</p>
            <button onclick="nextStep()">同意する</button>
        </div>
        <div id="step-2" style="display: none;">
            <input type="password" id="access-input" placeholder="Token...">
            <button onclick="checkAccess()">Enter</button>
        </div>
    </div>

    <script src="gatekeeper.js"></script>
</body>
</html>
