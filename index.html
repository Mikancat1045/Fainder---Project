<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Fainder - Welcome</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* テキスト選択不可 */
        }
        #gate-container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }
        .logo-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #333, #111);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #444;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        h1 { font-weight: 300; letter-spacing: 5px; margin-bottom: 30px; }
        .launch-btn {
            background: none;
            border: 1px solid #666;
            color: #ccc;
            padding: 12px 40px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 10;
        }
        .launch-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        /* ボット用トラップ（人間には絶対に見えない） */
        #bot-field {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="gate-container">
        <div class="logo-circle">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=80" style="width:60px; border-radius:10px;">
        </div>
        <h1>FAINDER</h1>
        
        <div id="bot-field">
            <input type="text" id="trap_input" tabindex="-1">
        </div>

        <button class="launch-btn" onclick="secureLaunch()">Fainderを起動する</button>
    </div>

    <script>
        const loadTime = Date.now();

        // 1. 起動処理（ボット対策込み）
        function secureLaunch() {
            const trap = document.getElementById('trap_input').value;
            const clickTime = Date.now() - loadTime;

            // トラップに値がある、またはクリックが速すぎる(0.5秒以内)場合はボット判定
            if (trap !== "" || clickTime < 500) {
                console.warn("Access Denied.");
                return;
            }

            // 遷移先を文字結合で隠す
            const target = ['index', '2', '.', 'h', 't', 'm', 'l'].join('');
            location.href = target;
        }

        // 2. コンソールガード（ショートカット禁止）
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || 
               (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) ||
               (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };

        // 3. 無限デバッガー（コンソールを開くとフリーズさせる）
        setInterval(function() {
            (function() {
                (function a() {
                    try {
                        (function b(i) {
                            if (('' + (i / i)).length !== 1 || i % 20 === 0) {
                                (function() {}).constructor('debugger')();
                            } else {
                                debugger;
                            }
                            b(++i);
                        })(0);
                    } catch (e) {
                        setTimeout(a, 50);
                    }
                })();
            })();
        }, 1000);

        // 4. コンソールを常にクリア
        setInterval(() => {
            console.clear();
        }, 500);
    </script>
</body>
</html>
