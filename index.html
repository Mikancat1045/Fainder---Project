<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; color: #333; }

<body id="main-body">

    <div id="dummy-page" class="dummy-content">

    </div>

    <div id="gate-banner" class="gate-banner">
        <div id="step-1">
            <span>サイト閲覧には同意が必要です。</span>
            <button onclick="nextStep()">同意する</button>
        </div>
        <div id="step-2" style="display: none;">
            <input type="password" id="access-input" placeholder="Token...">
            <button onclick="checkAccess()">Enter</button>
        </div>
    </div>

    <script src="gatekeeper.js"></script>
