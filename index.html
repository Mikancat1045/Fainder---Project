<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikan Dev Lab - Portfolio</title>
    <link rel="stylesheet" href="style.css"> </head>
<body id="main-root">
    <div id="gateway-ui" style="text-align: center; padding-top: 100px; font-family: sans-serif;">
        <h1>Welcome to Mikan Project</h1>
        <p>This site uses cookies to improve your experience.</p>
        <div id="pass-area" style="margin-top: 20px;">
            <input type="password" id="entry-pass" placeholder="Enter Access Code" 
                   style="padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff;">
            <button onclick="checkAccess()" style="padding: 10px 20px; cursor: pointer;">Agree & Enter</button>
        </div>
    </div>

    <div id="app-container" style="display: none;"></div>

    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script src="gateway.js"></script>
    <script src="app.js"></script>
</body>
</html>
