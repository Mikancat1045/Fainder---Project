<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fainder - Protected Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body" class="auth-mode">

    <div id="auth-container">
        <div id="auth-box">
            <h2 class="gradient-text">Fainder Access</h2>
            <p id="auth-msg">アクセス権限を確認してください</p>
            
            <div id="input-area">
                <input type="password" id="access-input" placeholder="アクセスキーを入力">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="save-token">
                    <label for="save-token">ログイン状態を保持する</label>
                </div>
                <button id="auth-submit-btn" onclick="checkAccess()">アクセスを許可</button>
            </div>
        </div>
    </div>

    <div id="app-root"></div>

    <script src="script.js"></script>
</body>
</html>
