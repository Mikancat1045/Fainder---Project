<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikan Dev Lab | Portfolio</title>
    <style>
        body { font-family: sans-serif; background: #fff; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .gate-banner { position: fixed; bottom: 0; left: 0; width: 100%; background: #202124; color: #fff; padding: 20px; text-align: center; box-sizing: border-box; }
        .gate-btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #access-input { padding: 8px; margin: 10px; background: #333; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body id="main-body">

    <div class="container">
        <h1>Programming Research Portfolio</h1>
        <p>JavaScriptとUIデザインの検証用サイトです。</p>
        <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px;">
            <h3>Module Test: CSS Grid</h3>
            <p>レスポンシブ・レイアウトのテスト中...</p>
        </div>
    </div>

    <div id="gate-banner" class="gate-banner">
        <div id="step-1">
            <p>コンテンツを表示するにはCookieに同意してください。</p>
            <button class="gate-btn" onclick="nextStep()">同意する</button>
        </div>
        <div id="step-2" style="display: none;">
            <p>トークンを入力してください</p>
            <input type="password" id="access-input" placeholder="Token...">
            <button class="gate-btn" onclick="checkAccess()">Enter</button>
        </div>
    </div>

    <script src="gatekeeper.js"></script>
</body>
</html>
