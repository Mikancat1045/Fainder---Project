<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fainder - Gateway</title>
    <style>
        body { background: #131314; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .gate-box { text-align: center; background: #1e1f20; padding: 40px; border-radius: 20px; border: 1px solid #333; }
        input { background: #28292a; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; width: 200px; }
        button { background: #4285f4; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body id="main-content">
    <div class="gate-box">
        <h1>Fainder Project</h1>
        <p>パスワードを入力してください</p>
        <input type="password" id="gate-pass" placeholder="Password">
        <br>
        <button onclick="verifyGate()">Enter</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script src="gateway.js"></script>
</body>
</html>
