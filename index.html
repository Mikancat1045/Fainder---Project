<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Portfolio - Learning Lab</title>
    <style>
        body { 
            background: #131314; color: white; margin: 0;
            font-family: "Google Sans", sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        /* SNSの器（最初は隠す） */
        #sns-root { display: none; width: 100%; height: 100%; }
        
        /* ゲートウェイUI */
        #gate-container { text-align: center; }
        .gate-box { 
            background: #1e1f20; padding: 40px; border-radius: 24px; 
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { background: #28292a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; width: 220px; outline: none; }
        button { background: #4285f4; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body id="appBody">

    <div id="gate-container">
        <div class="gate-box">
            <h1>Mikan Project Portfolio</h1>
            <p style="color: #888; margin-bottom: 20px;">Private Study Resource</p>
            <input type="password" id="gate-pass" placeholder="Access Key">
            <br>
            <button onclick="verifyGate()">Unlock Portfolio</button>
        </div>
    </div>

    <div id="sns-root"></div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
    <script src="gateway.js"></script>
</body>
</html>
