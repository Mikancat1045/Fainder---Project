<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikan Dev Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="fake-content">
        <h1>Mikan Dev Portfolio</h1>
        <p>プログラミングの学習成果を公開しています。</p>
    </div>

    <div id="real-app" style="display: none;">
        <h2>Fainder SNS</h2>
        <div id="post-area">
            <textarea id="post-input" placeholder="何してる？"></textarea>
            <button onclick="sendPost()">投稿</button>
        </div>
        <div id="timeline"></div>
    </div>

    <div id="gate-container" style="position: fixed; bottom: 0; width: 100%; background: #1a1a1c; color: #fff; padding: 25px; text-align: center; border-top: 2px solid #333;">
        <div id="cookie-step">
            <p>当サイトはクッキーを使用します。続行するには同意してください。</p>
            <button onclick="showPassStep()" style="background: #444; color: #fff; border: 1px solid #666; padding: 8px 16px; cursor: pointer;">同意する</button>
        </div>

        <div id="pass-step" style="display: none;">
            <p>アクセスキーを入力してください</p>
            <input type="password" id="access-key" placeholder="Key..." style="padding: 8px; border-radius: 4px; border: none; margin-bottom: 10px;">
            <br>
            <button onclick="verifyAndLaunch()" style="background: #007bff; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px;">Enter</button>
        </div>
    </div>

    <script src="gatekeeper.js"></script>
</body>
</html>
